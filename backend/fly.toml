# fly.toml configuration for doc-evaluator backend

app = "doc-evaluator-backend"

primary_region = "jnb"  # Johannesburg; change if you prefer another region

[build]
  dockerfile = "backend/Dockerfile"

[env]
  PORT = "8080"

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "1m"
